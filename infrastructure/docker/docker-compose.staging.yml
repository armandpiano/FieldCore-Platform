# ============================================
# FieldCore Staging Environment
# ============================================
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fieldcore-postgres-staging
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fieldcore_staging}
      POSTGRES_USER: ${POSTGRES_USER:-fieldcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fieldcore} -d ${POSTGRES_DB:-fieldcore_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fieldcore-staging-network

  redis:
    image: redis:7-alpine
    container_name: fieldcore-redis-staging
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_staging_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fieldcore-staging-network

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
      args:
        NODE_ENV: staging
    container_name: fieldcore-api-staging
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: ${API_PORT:-3001}
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-fieldcore_staging}
      DATABASE_USER: ${POSTGRES_USER:-fieldcore}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: fieldcore-evidence
      CORS_ORIGIN: ${CORS_ORIGIN}
    ports:
      - "${API_PORT:-3001}:${API_PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fieldcore-staging-network

  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NODE_ENV: staging
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    container_name: fieldcore-web-staging
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - fieldcore-staging-network

networks:
  fieldcore-staging-network:
    driver: bridge

volumes:
  postgres_staging_data:
  redis_staging_data:
