# ============================================
# FieldCore Site Configuration
# Production Reverse Proxy Setup
# ============================================

upstream fieldcore_web {
    server web:3000;
    keepalive 32;
}

upstream fieldcore_api {
    server api:3001;
    keepalive 32;
}

# ===== HTTP Server =====
server {
    listen 80;
    server_name _;

    # Redirect to HTTPS (uncomment for production)
    # return 301 https://$host$request_uri;

    # Health check endpoint for nginx
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Redirect all HTTP to HTTPS (for production)
    # Uncomment the following and configure SSL in the HTTPS server block
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

