# ===== Development Server (HTTP Only) =====
server {
    listen 80;
    server_name localhost *.localhost;

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Main application (Next.js)
    location / {
        proxy_pass http://fieldcore_web;
        proxy_http_version 1.1;
        
        # Next.js specific headers
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Next.js dev mode
        proxy_read_timeout 86400;
    }

    # API endpoints (NestJS)
    location /api {
        # Remove /api prefix when forwarding to API
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://fieldcore_api;
    }

    # Health check for API
    location /api/health {
        proxy_pass http://fieldcore_api/health;
        access_log off;
    }

    # Static assets with caching
    location /_next/static {
        proxy_pass http://fieldcore_web;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
